<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Summe einzelner 6 mal 6 SVD-Bildbausteine und kompakte Matrixform">
  <rect width="1200" height="320" fill="#ffffff"/>
  <defs>
    <style>
      .serif { font-family: "Computer Modern Serif", "Latin Modern Roman", Georgia, serif; }
      .ink { fill: #111111; }
      .muted { fill: #666666; }
      .u { fill: #1e88ff; }
      .v { fill: #16a34a; }
      .sigma { fill: #f2aa00; }
      .card { fill: #ffffff; stroke: #d8d8d8; stroke-width: 1.5; }
      .matrix-card { fill: #fbfbfb; stroke: #bcbcbc; stroke-width: 1.5; }
      .cell0 { fill: #f5f5f5; stroke: #d5d5d5; stroke-width: 0.8; }
      .cell1 { fill: #d6d6d6; stroke: #aaaaaa; stroke-width: 0.8; }
      .cell2 { fill: #8f8f8f; stroke: #6d6d6d; stroke-width: 0.8; }
      .cell3 { fill: #222222; stroke: #111111; stroke-width: 0.8; }
      .arrow { stroke: #111111; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111111"/>
    </marker>
  </defs>

  <text class="serif ink" x="28" y="31" font-size="20">Einzelne 6×6-Bildbausteine</text>
  <text class="serif muted" x="28" y="54" font-size="14">Bᵢ = σᵢuᵢvᵢᵀ</text>

  <!-- B1 card -->
  <g transform="translate(24 78)">
    <rect class="card" x="0" y="0" width="132" height="150" rx="6"/>
    <text class="serif ink" x="53" y="24" font-size="16">B₁</text>
    <text class="serif muted" x="24" y="42" font-size="12">vertikaler Anteil</text>
    <g transform="translate(21 55)">
      <rect class="cell0" x="0" y="0" width="13" height="13"/><rect class="cell0" x="16" y="0" width="13" height="13"/><rect class="cell3" x="32" y="0" width="13" height="13"/><rect class="cell3" x="48" y="0" width="13" height="13"/><rect class="cell0" x="64" y="0" width="13" height="13"/><rect class="cell0" x="80" y="0" width="13" height="13"/>
      <rect class="cell0" x="0" y="16" width="13" height="13"/><rect class="cell0" x="16" y="16" width="13" height="13"/><rect class="cell3" x="32" y="16" width="13" height="13"/><rect class="cell3" x="48" y="16" width="13" height="13"/><rect class="cell0" x="64" y="16" width="13" height="13"/><rect class="cell0" x="80" y="16" width="13" height="13"/>
      <rect class="cell0" x="0" y="32" width="13" height="13"/><rect class="cell0" x="16" y="32" width="13" height="13"/><rect class="cell3" x="32" y="32" width="13" height="13"/><rect class="cell3" x="48" y="32" width="13" height="13"/><rect class="cell0" x="64" y="32" width="13" height="13"/><rect class="cell0" x="80" y="32" width="13" height="13"/>
      <rect class="cell0" x="0" y="48" width="13" height="13"/><rect class="cell0" x="16" y="48" width="13" height="13"/><rect class="cell3" x="32" y="48" width="13" height="13"/><rect class="cell3" x="48" y="48" width="13" height="13"/><rect class="cell0" x="64" y="48" width="13" height="13"/><rect class="cell0" x="80" y="48" width="13" height="13"/>
      <rect class="cell0" x="0" y="64" width="13" height="13"/><rect class="cell0" x="16" y="64" width="13" height="13"/><rect class="cell0" x="32" y="64" width="13" height="13"/><rect class="cell0" x="48" y="64" width="13" height="13"/><rect class="cell0" x="64" y="64" width="13" height="13"/><rect class="cell0" x="80" y="64" width="13" height="13"/>
      <rect class="cell0" x="0" y="80" width="13" height="13"/><rect class="cell0" x="16" y="80" width="13" height="13"/><rect class="cell0" x="32" y="80" width="13" height="13"/><rect class="cell0" x="48" y="80" width="13" height="13"/><rect class="cell0" x="64" y="80" width="13" height="13"/><rect class="cell0" x="80" y="80" width="13" height="13"/>
    </g>
  </g>

  <text class="serif ink" x="171" y="158" font-size="28">+</text>

  <!-- B2 card -->
  <g transform="translate(198 78)">
    <rect class="card" x="0" y="0" width="132" height="150" rx="6"/>
    <text class="serif ink" x="53" y="24" font-size="16">B₂</text>
    <text class="serif muted" x="20" y="42" font-size="12">horizontaler Anteil</text>
    <g transform="translate(21 55)">
      <rect class="cell0" x="0" y="0" width="13" height="13"/><rect class="cell0" x="16" y="0" width="13" height="13"/><rect class="cell0" x="32" y="0" width="13" height="13"/><rect class="cell0" x="48" y="0" width="13" height="13"/><rect class="cell0" x="64" y="0" width="13" height="13"/><rect class="cell0" x="80" y="0" width="13" height="13"/>
      <rect class="cell2" x="0" y="16" width="13" height="13"/><rect class="cell2" x="16" y="16" width="13" height="13"/><rect class="cell2" x="32" y="16" width="13" height="13"/><rect class="cell2" x="48" y="16" width="13" height="13"/><rect class="cell2" x="64" y="16" width="13" height="13"/><rect class="cell2" x="80" y="16" width="13" height="13"/>
      <rect class="cell2" x="0" y="32" width="13" height="13"/><rect class="cell2" x="16" y="32" width="13" height="13"/><rect class="cell2" x="32" y="32" width="13" height="13"/><rect class="cell2" x="48" y="32" width="13" height="13"/><rect class="cell2" x="64" y="32" width="13" height="13"/><rect class="cell2" x="80" y="32" width="13" height="13"/>
      <rect class="cell0" x="0" y="48" width="13" height="13"/><rect class="cell0" x="16" y="48" width="13" height="13"/><rect class="cell0" x="32" y="48" width="13" height="13"/><rect class="cell0" x="48" y="48" width="13" height="13"/><rect class="cell0" x="64" y="48" width="13" height="13"/><rect class="cell0" x="80" y="48" width="13" height="13"/>
      <rect class="cell0" x="0" y="64" width="13" height="13"/><rect class="cell0" x="16" y="64" width="13" height="13"/><rect class="cell0" x="32" y="64" width="13" height="13"/><rect class="cell0" x="48" y="64" width="13" height="13"/><rect class="cell0" x="64" y="64" width="13" height="13"/><rect class="cell0" x="80" y="64" width="13" height="13"/>
      <rect class="cell0" x="0" y="80" width="13" height="13"/><rect class="cell0" x="16" y="80" width="13" height="13"/><rect class="cell0" x="32" y="80" width="13" height="13"/><rect class="cell0" x="48" y="80" width="13" height="13"/><rect class="cell0" x="64" y="80" width="13" height="13"/><rect class="cell0" x="80" y="80" width="13" height="13"/>
    </g>
  </g>

  <text class="serif ink" x="345" y="158" font-size="28">+</text>

  <!-- B3 card -->
  <g transform="translate(372 78)">
    <rect class="card" x="0" y="0" width="132" height="150" rx="6"/>
    <text class="serif ink" x="53" y="24" font-size="16">B₃</text>
    <text class="serif muted" x="33" y="42" font-size="12">feiner Anteil</text>
    <g transform="translate(21 55)">
      <rect class="cell1" x="0" y="0" width="13" height="13"/><rect class="cell0" x="16" y="0" width="13" height="13"/><rect class="cell0" x="32" y="0" width="13" height="13"/><rect class="cell0" x="48" y="0" width="13" height="13"/><rect class="cell0" x="64" y="0" width="13" height="13"/><rect class="cell0" x="80" y="0" width="13" height="13"/>
      <rect class="cell0" x="0" y="16" width="13" height="13"/><rect class="cell1" x="16" y="16" width="13" height="13"/><rect class="cell0" x="32" y="16" width="13" height="13"/><rect class="cell0" x="48" y="16" width="13" height="13"/><rect class="cell0" x="64" y="16" width="13" height="13"/><rect class="cell0" x="80" y="16" width="13" height="13"/>
      <rect class="cell0" x="0" y="32" width="13" height="13"/><rect class="cell0" x="16" y="32" width="13" height="13"/><rect class="cell1" x="32" y="32" width="13" height="13"/><rect class="cell0" x="48" y="32" width="13" height="13"/><rect class="cell0" x="64" y="32" width="13" height="13"/><rect class="cell0" x="80" y="32" width="13" height="13"/>
      <rect class="cell0" x="0" y="48" width="13" height="13"/><rect class="cell0" x="16" y="48" width="13" height="13"/><rect class="cell0" x="32" y="48" width="13" height="13"/><rect class="cell1" x="48" y="48" width="13" height="13"/><rect class="cell0" x="64" y="48" width="13" height="13"/><rect class="cell0" x="80" y="48" width="13" height="13"/>
      <rect class="cell0" x="0" y="64" width="13" height="13"/><rect class="cell0" x="16" y="64" width="13" height="13"/><rect class="cell0" x="32" y="64" width="13" height="13"/><rect class="cell0" x="48" y="64" width="13" height="13"/><rect class="cell1" x="64" y="64" width="13" height="13"/><rect class="cell0" x="80" y="64" width="13" height="13"/>
      <rect class="cell0" x="0" y="80" width="13" height="13"/><rect class="cell0" x="16" y="80" width="13" height="13"/><rect class="cell0" x="32" y="80" width="13" height="13"/><rect class="cell0" x="48" y="80" width="13" height="13"/><rect class="cell0" x="64" y="80" width="13" height="13"/><rect class="cell1" x="80" y="80" width="13" height="13"/>
    </g>
  </g>

  <text class="serif ink" x="520" y="158" font-size="24">+ ... =</text>

  <!-- A card -->
  <g transform="translate(604 58)">
    <rect class="matrix-card" x="0" y="0" width="162" height="180" rx="7"/>
    <text class="serif ink" x="74" y="24" font-size="18">A</text>
    <text class="serif muted" x="22" y="45" font-size="13">Summe ergibt Bild</text>
    <g transform="translate(31 64)">
      <rect class="cell1" x="0" y="0" width="14" height="14"/><rect class="cell0" x="17" y="0" width="14" height="14"/><rect class="cell3" x="34" y="0" width="14" height="14"/><rect class="cell3" x="51" y="0" width="14" height="14"/><rect class="cell0" x="68" y="0" width="14" height="14"/><rect class="cell0" x="85" y="0" width="14" height="14"/>
      <rect class="cell2" x="0" y="17" width="14" height="14"/><rect class="cell2" x="17" y="17" width="14" height="14"/><rect class="cell3" x="34" y="17" width="14" height="14"/><rect class="cell3" x="51" y="17" width="14" height="14"/><rect class="cell2" x="68" y="17" width="14" height="14"/><rect class="cell2" x="85" y="17" width="14" height="14"/>
      <rect class="cell2" x="0" y="34" width="14" height="14"/><rect class="cell2" x="17" y="34" width="14" height="14"/><rect class="cell3" x="34" y="34" width="14" height="14"/><rect class="cell2" x="51" y="34" width="14" height="14"/><rect class="cell2" x="68" y="34" width="14" height="14"/><rect class="cell2" x="85" y="34" width="14" height="14"/>
      <rect class="cell0" x="0" y="51" width="14" height="14"/><rect class="cell0" x="17" y="51" width="14" height="14"/><rect class="cell3" x="34" y="51" width="14" height="14"/><rect class="cell3" x="51" y="51" width="14" height="14"/><rect class="cell0" x="68" y="51" width="14" height="14"/><rect class="cell0" x="85" y="51" width="14" height="14"/>
      <rect class="cell0" x="0" y="68" width="14" height="14"/><rect class="cell0" x="17" y="68" width="14" height="14"/><rect class="cell0" x="34" y="68" width="14" height="14"/><rect class="cell0" x="51" y="68" width="14" height="14"/><rect class="cell1" x="68" y="68" width="14" height="14"/><rect class="cell0" x="85" y="68" width="14" height="14"/>
      <rect class="cell0" x="0" y="85" width="14" height="14"/><rect class="cell0" x="17" y="85" width="14" height="14"/><rect class="cell0" x="34" y="85" width="14" height="14"/><rect class="cell0" x="51" y="85" width="14" height="14"/><rect class="cell0" x="68" y="85" width="14" height="14"/><rect class="cell1" x="85" y="85" width="14" height="14"/>
    </g>
  </g>

  <path class="arrow" d="M785 148 L835 148"/>
  <text class="serif muted" x="789" y="125" font-size="13">kompakt</text>

  <!-- Matrix product card -->
  <g transform="translate(855 58)">
    <rect class="card" x="0" y="0" width="318" height="180" rx="7"/>
    <text class="serif ink" x="58" y="34" font-size="25">A = Uᵣ Σᵣ Vᵣᵀ</text>
    <text class="serif muted" x="66" y="58" font-size="14">gleiche Aussage als Matrixprodukt</text>
    <g transform="translate(38 88)">
      <rect fill="#e8f2ff" stroke="#1e88ff" x="0" y="0" width="66" height="46" rx="4"/>
      <text class="serif u" x="20" y="29" font-size="20">Uᵣ</text>
      <text class="serif ink" x="82" y="30" font-size="20">×</text>
      <rect fill="#fff6d9" stroke="#f2aa00" x="104" y="0" width="66" height="46" rx="4"/>
      <text class="serif sigma" x="125" y="29" font-size="20">Σᵣ</text>
      <text class="serif ink" x="186" y="30" font-size="20">×</text>
      <rect fill="#d9f2df" stroke="#16a34a" x="208" y="0" width="66" height="46" rx="4"/>
      <text class="serif v" x="222" y="29" font-size="20">Vᵣᵀ</text>
    </g>
    <text class="serif u" x="40" y="158" font-size="12">Höhen</text>
    <text class="serif sigma" x="124" y="158" font-size="12">Singulärwerte</text>
    <text class="serif v" x="236" y="158" font-size="12">Spalten</text>
  </g>

  <text class="serif muted" x="28" y="286" font-size="14">Alle kleinen Matrizen sind 6×6. Summe der Bausteine und Matrixform beschreiben dieselbe Rekonstruktion.</text>
</svg>
