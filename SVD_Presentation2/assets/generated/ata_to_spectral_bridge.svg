<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-label="Von der Bewertungsmatrix A transponiert A zum Spektralsatz und zu orthogonalen Spaltenmustern">
  <rect width="980" height="260" fill="#ffffff"/>
  <defs>
    <style>
      .serif { font-family: "Computer Modern Serif", "Latin Modern Roman", Georgia, serif; }
      .ink { fill: #111111; }
      .muted { fill: #666666; }
      .v { fill: #16a34a; }
      .box { fill: #ffffff; stroke: #d8d8d8; stroke-width: 1.4; }
      .ata { fill: #f7f7f7; stroke: #111111; stroke-width: 1.6; }
      .arrow { stroke: #111111; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#111111"/>
    </marker>
  </defs>

  <g transform="translate(48 28)">
    <rect class="box" x="0" y="0" width="190" height="76" rx="4"/>
    <text class="serif ink" x="22" y="25" font-size="15">Suchproblem</text>
    <text class="serif ink" x="22" y="55" font-size="18">max </text>
    <text class="serif v" x="62" y="55" font-size="18">vᵀ</text>
    <text class="serif ink" x="90" y="55" font-size="18">AᵀA</text>
    <text class="serif v" x="134" y="55" font-size="18">v</text>
  </g>

  <path class="arrow" d="M252 66 L320 66"/>

  <g transform="translate(338 28)">
    <rect class="ata" x="0" y="0" width="220" height="76" rx="4"/>
    <text class="serif ink" x="26" y="31" font-size="20">Bewertungsmatrix AᵀA</text>
    <text class="serif muted" x="34" y="57" font-size="14">bewertet Spaltenmuster</text>
  </g>

  <path class="arrow" d="M572 66 L640 66"/>

  <g transform="translate(658 28)">
    <rect class="ata" x="0" y="0" width="250" height="76" rx="4"/>
    <text class="serif ink" x="48" y="31" font-size="18">quadratisch + symmetrisch</text>
    <text class="serif muted" x="63" y="57" font-size="14">passt zum Spektralsatz</text>
  </g>

  <path class="arrow" d="M785 116 L785 156"/>

  <g transform="translate(630 170)">
    <rect class="box" x="0" y="0" width="310" height="58" rx="4"/>
    <text class="serif ink" x="104" y="25" font-size="17">Spektralsatz</text>
    <text class="serif muted" x="44" y="45" font-size="13">erst hier entstehen die orthogonalen Muster</text>
  </g>

  <path class="arrow" d="M615 199 L535 199"/>

  <g transform="translate(214 170)">
    <rect class="box" x="0" y="0" width="300" height="58" rx="4"/>
    <text class="serif v" x="36" y="25" font-size="17">beste orthogonale Spaltenmuster vᵢ</text>
    <text class="serif muted" x="72" y="45" font-size="13">nach der Bewertung geordnet</text>
  </g>
</svg>
