    <rect class="mcell lo" x="0" y="22" width="28" height="22" stroke="#16a34a"/><text class="serif ink" x="10" y="38" font-size="12">0</text>
    <rect class="mcell hi" x="0" y="44" width="28" height="22" stroke="#16a34a"/><text class="serif ink" x="10" y="60" font-size="12">1</text>
