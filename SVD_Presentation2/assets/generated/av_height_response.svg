      .v { fill: #16a34a; }
      .u { fill: #1e88ff; }
      .sigma { fill: #f2aa00; }
      .arrow { stroke: #111111; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .cell { stroke: #ffffff; stroke-width: 1; }
      .mcell { stroke: #d8d8d8; stroke-width: 1.1; }
      .hi { fill: #d9f2df; }
      .lo { fill: #f7f7f7; }
      .bluecell { fill: #e8f2ff; stroke: #1e88ff; stroke-width: 1.2; }
