    <circle class="cell" cx="13" cy="45" r="7" fill="#eeeeee"/><circle class="cell" cx="29" cy="45" r="7" fill="#eeeeee"/><circle class="cell" cx="45" cy="45" r="7" fill="#111111"/><circle class="cell" cx="61" cy="45" r="7" fill="#111111"/><circle class="cell" cx="77" cy="45" r="7" fill="#eeeeee"/><circle class="cell" cx="93" cy="45" r="7" fill="#eeeeee"/>
