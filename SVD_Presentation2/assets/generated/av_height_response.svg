<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" role="img" aria-label="Bildbaustein als Matrix A, multipliziert mit einem Spaltenmuster v, ergibt die Hoehenantwort Av">
  <rect width="980" height="220" fill="#ffffff"/>
  <defs>
